<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { margin: 5px; padding: 8px; }
        #log { 
            border: 1px solid #ccc; 
            padding: 10px; 
            height: 300px; 
            overflow-y: scroll; 
            margin-top: 10px; 
            background: #f5f5f5;
            font-family: monospace;
        }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div>
        <label for="wsUrl">WebSocket URL:</label>
        <input type="text" id="wsUrl" value="ws://localhost:8003/ws" size="30">
    </div>
    <div>
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
    </div>
    <div>
        <button id="sendTextBtn" disabled>Send Text Message</button>
        <button id="send1ByteBtn" disabled>Send 1 Byte Binary</button>
        <button id="send1KBBtn" disabled>Send 1KB Binary</button>
        <button id="send10KBBtn" disabled>Send 10KB Binary</button>
        <button id="sendJsonEosBtn" disabled>Send JSON EOS</button>
        <button id="sendStringEosBtn" disabled>Send String EOS</button>
        <button id="pingBtn" disabled>Send Ping</button>
    </div>
    <div id="log"></div>

    <script>
        let ws = null;
        const logElem = document.getElementById('log');
        const wsUrlInput = document.getElementById('wsUrl');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const sendTextBtn = document.getElementById('sendTextBtn');
        const send1ByteBtn = document.getElementById('send1ByteBtn');
        const send1KBBtn = document.getElementById('send1KBBtn');
        const send10KBBtn = document.getElementById('send10KBBtn');
        const sendJsonEosBtn = document.getElementById('sendJsonEosBtn');
        const sendStringEosBtn = document.getElementById('sendStringEosBtn');
        const pingBtn = document.getElementById('pingBtn');

        function log(message, className = '') {
            const timestamp = new Date().toLocaleTimeString();
            logElem.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logElem.scrollTop = logElem.scrollHeight;
        }

        function setButtonsState(connected) {
            connectBtn.disabled = connected;
            disconnectBtn.disabled = !connected;
            sendTextBtn.disabled = !connected;
            send1ByteBtn.disabled = !connected;
            send1KBBtn.disabled = !connected;
            send10KBBtn.disabled = !connected;
            sendJsonEosBtn.disabled = !connected;
            sendStringEosBtn.disabled = !connected;
            pingBtn.disabled = !connected;
        }

        connectBtn.addEventListener('click', () => {
            const url = wsUrlInput.value;
            log(`Connecting to ${url}...`, 'info');
            
            try {
                ws = new WebSocket(url);
                ws.binaryType = 'arraybuffer'; // Important for binary data
                
                ws.onopen = () => {
                    log('Connection established', 'success');
                    setButtonsState(true);
                };
                
                ws.onclose = (event) => {
                    log(`Connection closed. Code: ${event.code}, Reason: ${event.reason || 'None'}`, event.code === 1000 ? 'info' : 'error');
                    setButtonsState(false);
                    ws = null;
                };
                
                ws.onerror = (error) => {
                    log('WebSocket error', 'error');
                    console.error('WebSocket error:', error);
                };
                
                ws.onmessage = (event) => {
                    if (event.data instanceof ArrayBuffer) {
                        const view = new Uint8Array(event.data);
                        log(`Received binary message: ${view.length} bytes`, 'info');
                    } else {
                        try {
                            const jsonData = JSON.parse(event.data);
                            log(`Received: ${JSON.stringify(jsonData)}`, 'info');
                        } catch (e) {
                            log(`Received text: ${event.data}`, 'info');
                        }
                    }
                };
            } catch (error) {
                log(`Failed to connect: ${error.message}`, 'error');
            }
        });
        
        disconnectBtn.addEventListener('click', () => {
            if (ws) {
                log('Closing connection...', 'info');
                ws.close(1000, 'Closed by user');
            }
        });
        
        sendTextBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = JSON.stringify({type: "ping", timestamp: Date.now()});
                ws.send(message);
                log(`Sent text message: ${message}`, 'info');
            } else {
                log('Cannot send: WebSocket not connected', 'error');
            }
        });
        
        send1ByteBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const buffer = new Uint8Array([42]); // Just one byte (42)
                ws.send(buffer);
                log('Sent 1 byte binary message', 'info');
            } else {
                log('Cannot send: WebSocket not connected', 'error');
            }
        });
        
        send1KBBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const buffer = new Uint8Array(1024); // 1KB of zeros
                for (let i = 0; i < buffer.length; i++) buffer[i] = i % 256;
                ws.send(buffer);
                log('Sent 1KB binary message', 'info');
            } else {
                log('Cannot send: WebSocket not connected', 'error');
            }
        });
        
        send10KBBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const buffer = new Uint8Array(10 * 1024); // 10KB of zeros
                for (let i = 0; i < buffer.length; i++) buffer[i] = i % 256;
                ws.send(buffer);
                log('Sent 10KB binary message', 'info');
            } else {
                log('Cannot send: WebSocket not connected', 'error');
            }
        });
        
        sendJsonEosBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = JSON.stringify({type: "eos"});
                ws.send(message);
                log(`Sent JSON EOS: ${message}`, 'info');
            } else {
                log('Cannot send: WebSocket not connected', 'error');
            }
        });

        sendStringEosBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send("EOS");
                log('Sent string "EOS"', 'info');
            } else {
                log('Cannot send: WebSocket not connected', 'error');
            }
        });
        
        pingBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = JSON.stringify({type: "ping", timestamp: Date.now()});
                ws.send(message);
                log(`Sent ping: ${message}`, 'info');
            } else {
                log('Cannot send: WebSocket not connected', 'error');
            }
        });
        
        // Initialize
        log('WebSocket tester initialized', 'info');
        log('Click "Connect" to establish WebSocket connection', 'info');
    </script>
</body>
</html>
