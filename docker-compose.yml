services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MODEL_PATH=/app/models
      - HOST=0.0.0.0
      - PORT=8003
      # WebSocket timeout configuration
      - APP_WATCHDOG_INACTIVITY_TIMEOUT=120
      - APP_WATCHDOG_CHECK_INTERVAL=5
      - APP_AUDIO_CONVERSION_TIMEOUT=20
      - APP_AUDIO_PROCESSING_TIMEOUT=15
      - APP_AI_RESPONSE_TIMEOUT=60
      - APP_MESSAGE_SEND_TIMEOUT=10
      # WebSocket connection settings (also used by frontend)
      - APP_WS_PING_INTERVAL=15000
      - APP_WS_SERVER_TIMEOUT=60000
      - APP_WS_RECONNECT_MAX_ATTEMPTS=5
      - APP_WS_RECONNECT_BASE_DELAY=1000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - models:/app/models
    restart: unless-stopped
    networks:
      - voice-agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WS_URL=ws://localhost:8003/ws
        - NEXT_PUBLIC_API_URL=http://localhost:8003
        - NEXT_PUBLIC_WS_RECONNECT_MAX_ATTEMPTS=5
        - NEXT_PUBLIC_WS_RECONNECT_BASE_DELAY=1000
        - NEXT_PUBLIC_WS_PING_INTERVAL=15000
        - NEXT_PUBLIC_WS_SERVER_TIMEOUT=60000
    ports:
      - "3000:3000"
    environment:
      # For production, this should be wss://yourdomain.com/ws
      - NEXT_PUBLIC_WS_URL=ws://localhost:8003/ws
      # For production, this should be https://yourdomain.com
      - NEXT_PUBLIC_API_URL=http://localhost:8003
      # Sync WebSocket settings with backend values
      - NEXT_PUBLIC_WS_RECONNECT_MAX_ATTEMPTS=${APP_WS_RECONNECT_MAX_ATTEMPTS:-5}
      - NEXT_PUBLIC_WS_RECONNECT_BASE_DELAY=${APP_WS_RECONNECT_BASE_DELAY:-1000}
      - NEXT_PUBLIC_WS_PING_INTERVAL=${APP_WS_PING_INTERVAL:-15000}
      - NEXT_PUBLIC_WS_SERVER_TIMEOUT=${APP_WS_SERVER_TIMEOUT:-60000}
    restart: unless-stopped
    networks:
      - voice-agent-network
    depends_on:
      - backend

volumes:
  models:
  logs:

networks:
  voice-agent-network:
    driver: bridge

# Production Deployment Note:
# For production environments, it is highly recommended to use a reverse proxy
# (e.g., Nginx, Traefik) in front of the frontend and backend services.
# The reverse proxy should handle SSL/TLS termination, providing secure HTTPS
# and WSS connections to the clients.
#
# Example Nginx configuration snippet for WebSocket:
# location /ws {
#     proxy_pass http://backend:8003/ws;
#     proxy_http_version 1.1;
#     proxy_set_header Upgrade $http_upgrade;
#     proxy_set_header Connection "Upgrade";
#     proxy_set_header Host $host;
# } 