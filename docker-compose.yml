services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MODEL_PATH=/app/models
      - HOST=0.0.0.0
      - PORT=8003
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - models:/app/models
    restart: unless-stopped
    networks:
      - voice-agent-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WS_URL=ws://localhost:8003/ws
        - NEXT_PUBLIC_API_URL=http://localhost:8003
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8003/ws
      - NEXT_PUBLIC_API_URL=http://localhost:8003
    restart: unless-stopped
    networks:
      - voice-agent-network
    depends_on:
      - backend

volumes:
  models:
  logs:

networks:
  voice-agent-network:
    driver: bridge 